<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>freeflies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --space:   #181818;
      --granite: #373737;
      --steel:   #959595;
      --green:   #57D873;
      --blue:    #387BF0;
      --white:   #FFFFFF;
      --red:     #FF6B6B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--space);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      padding: 1.75rem 2.5rem;
      border-bottom: 1px solid var(--granite);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand { display: flex; align-items: baseline; gap: 0.5rem; }

    .brand-name {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .pixel {
      color: var(--green);
      animation: blink 1.1s step-end infinite;
      font-size: 1rem;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .brand-tag {
      font-size: 0.75rem;
      color: var(--steel);
      font-weight: 400;
    }

    .model-badge {
      font-size: 0.7rem;
      color: var(--steel);
      border: 1px solid var(--granite);
      padding: 0.25rem 0.6rem;
      border-radius: 2px;
      letter-spacing: 0.04em;
      font-weight: 500;
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 3rem 2.5rem;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Drop zone ── */
    .drop-zone {
      border: 1.5px dashed var(--granite);
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--green);
      background: rgba(87, 216, 115, 0.03);
    }

    .drop-icon {
      font-size: 1.75rem;
      margin-bottom: 1rem;
      opacity: 0.3;
      line-height: 1;
    }

    .drop-label {
      color: var(--steel);
      font-size: 0.875rem;
    }

    .drop-label .pick {
      color: var(--green);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .drop-formats {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #5c5c5c;
      letter-spacing: 0.04em;
    }

    #fileInput { display: none; }

    /* ── File info bar ── */
    .file-bar {
      display: none;
      margin-top: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--granite);
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .file-bar.visible { display: flex; }

    .file-meta { display: flex; flex-direction: column; gap: 0.15rem; }
    .file-name { font-size: 0.875rem; font-weight: 500; }
    .file-size { font-size: 0.7rem; color: var(--steel); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      letter-spacing: 0.01em;
    }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary { background: var(--green); color: var(--space); }
    .btn-primary:not(:disabled):hover { background: #6ee887; }

    .btn-ghost { background: #282828; color: var(--white); }
    .btn-ghost:not(:disabled):hover { background: #2f2f2f; }

    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.7rem; }

    /* ── Actions row ── */
    .actions {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* ── Status ── */
    .status {
      display: none;
      margin-top: 1.25rem;
      padding: 0.875rem 1rem;
      background: #202020;
      border-left: 2px solid var(--green);
      font-size: 0.8rem;
      color: var(--steel);
    }

    .status.visible { display: flex; align-items: center; gap: 0.75rem; }
    .status.error { border-left-color: var(--red); color: var(--red); }

    .spinner {
      width: 14px;
      height: 14px;
      border: 1.5px solid #333;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    .results { display: none; margin-top: 2.5rem; }
    .results.visible { display: block; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.7rem;
      color: var(--steel);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .results-actions { display: flex; gap: 0.5rem; }

    /* ── Meta strip ── */
    .meta-strip {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.25rem;
      padding: 1rem 1.25rem;
      background: #202020;
      border-top: 2px solid var(--green);
    }

    .meta-item { display: flex; flex-direction: column; gap: 0.2rem; }

    .meta-label {
      font-size: 0.65rem;
      color: var(--steel);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .meta-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--green);
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border: 1px solid var(--granite);
      width: fit-content;
    }

    .view-toggle button {
      background: transparent;
      color: var(--steel);
      border: none;
      padding: 0.4rem 1rem;
      font-family: inherit;
      font-size: 0.72rem;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }

    .view-toggle button.active { background: var(--green); color: var(--space); font-weight: 600; }

    /* ── Transcript view ── */
    .transcript {
      background: #111;
      padding: 1.5rem;
      overflow: auto;
      max-height: 55vh;
      border: 1px solid #252525;
    }

    .turn { display: flex; gap: 1rem; margin-bottom: 1.1rem; }
    .turn:last-child { margin-bottom: 0; }

    .turn-speaker {
      flex-shrink: 0;
      width: 90px;
      font-size: 0.72rem;
      font-weight: 600;
      padding-top: 0.1rem;
    }

    .turn-time { font-size: 0.62rem; color: #5c5c5c; font-weight: 400; margin-top: 0.15rem; }
    .turn-text { font-size: 0.85rem; line-height: 1.6; color: #ddd; }

    /* ── JSON output ── */
    .json-wrap {
      background: #111;
      padding: 1.25rem 1.5rem;
      overflow: auto;
      max-height: 55vh;
      border: 1px solid #252525;
    }

    .json-wrap pre {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      line-height: 1.65;
      white-space: pre;
      color: #ccc;
    }

    .hidden { display: none !important; }

    /* ── Footer ── */
    footer {
      padding: 1.25rem 2.5rem;
      border-top: 1px solid var(--granite);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left { font-size: 0.7rem; color: #3d3d3d; }
    .footer-right { font-size: 0.7rem; color: #3d3d3d; }
    .footer-right a { color: var(--steel); text-decoration: none; }
    .footer-right a:hover { color: var(--green); }

    /* ── Prompt line decoration ── */
    .prompt-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      font-size: 0.75rem;
      color: #3d3d3d;
    }

    .prompt-line::before,
    .prompt-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--granite);
    }

    .prompt-text { color: var(--steel); white-space: nowrap; }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <span class="brand-name">freeflies</span>
      <span class="pixel">■</span>
      <span class="brand-tag">meeting transcription, no noise.</span>
    </div>
    <div class="model-badge">large-v3</div>
  </header>

  <main>
    <div class="prompt-line">
      <span class="prompt-text">drop an audio file to begin</span>
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">◎</div>
      <div class="drop-label">
        Drag and drop your audio file here, or
        <span class="pick" id="pickTrigger">browse</span>
      </div>
      <div class="drop-formats">MP3 &nbsp;·&nbsp; MP4 &nbsp;·&nbsp; WAV &nbsp;·&nbsp; M4A &nbsp;·&nbsp; FLAC &nbsp;·&nbsp; OGG &nbsp;·&nbsp; WEBM</div>
      <input type="file" id="fileInput" accept="audio/*,video/*">
    </div>

    <div class="file-bar" id="fileBar">
      <div class="file-meta">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
      </div>
      <button class="btn btn-ghost btn-sm" id="clearBtn">clear</button>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="transcribeBtn" disabled>transcribe</button>
    </div>

    <div class="status" id="status">
      <div class="spinner" id="spinner"></div>
      <span id="statusText"></span>
    </div>

    <div class="results" id="results">
      <div class="results-header">
        <span class="section-label">output</span>
        <div class="results-actions">
          <button class="btn btn-ghost btn-sm" id="copyBtn">copy json</button>
          <button class="btn btn-ghost btn-sm" id="downloadBtn">download</button>
        </div>
      </div>

      <div class="meta-strip" id="metaStrip"></div>

      <div class="view-toggle">
        <button id="tabTranscript" class="active">transcript</button>
        <button id="tabJson">json</button>
      </div>

      <div class="transcript" id="transcript"></div>

      <div class="json-wrap hidden" id="jsonWrap">
        <pre id="jsonOutput"></pre>
      </div>
    </div>
  </main>

  <footer>
    <span class="footer-left">freeflies ■</span>
    <span class="footer-right">
      <a href="https://github.com/SYSTRAN/faster-whisper" target="_blank">faster-whisper</a>
      &nbsp;·&nbsp; Applied AI
    </span>
  </footer>

  <script>
    let selectedFile = null;
    let lastResult = null;

    const dropZone    = document.getElementById('dropZone');
    const fileInput   = document.getElementById('fileInput');
    const fileBar     = document.getElementById('fileBar');
    const fileName    = document.getElementById('fileName');
    const fileSize    = document.getElementById('fileSize');
    const clearBtn    = document.getElementById('clearBtn');
    const transcribeBtn = document.getElementById('transcribeBtn');
    const status      = document.getElementById('status');
    const statusText  = document.getElementById('statusText');
    const spinner     = document.getElementById('spinner');
    const results     = document.getElementById('results');
    const metaStrip   = document.getElementById('metaStrip');
    const transcript  = document.getElementById('transcript');
    const jsonWrap    = document.getElementById('jsonWrap');
    const jsonOutput  = document.getElementById('jsonOutput');
    const copyBtn     = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const tabTranscript = document.getElementById('tabTranscript');
    const tabJson       = document.getElementById('tabJson');

    const SPEAKER_COLORS = ['#57D873', '#387BF0', '#E4B23B', '#E47ACF', '#3BE4D8', '#E4793B'];

    tabTranscript.addEventListener('click', () => {
      tabTranscript.classList.add('active'); tabJson.classList.remove('active');
      transcript.classList.remove('hidden'); jsonWrap.classList.add('hidden');
    });
    tabJson.addEventListener('click', () => {
      tabJson.classList.add('active'); tabTranscript.classList.remove('active');
      jsonWrap.classList.remove('hidden'); transcript.classList.add('hidden');
    });

    // Drag and drop
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    document.getElementById('pickTrigger').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) setFile(e.target.files[0]);
    });

    clearBtn.addEventListener('click', clearFile);

    function setFile(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      fileBar.classList.add('visible');
      transcribeBtn.disabled = false;
      results.classList.remove('visible');
      hideStatus();
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      fileBar.classList.remove('visible');
      transcribeBtn.disabled = true;
    }

    // Transcribe
    transcribeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      transcribeBtn.disabled = true;
      transcribeBtn.textContent = 'processing...';
      showStatus('Transcribing. Large-v3 may take a moment for long recordings.', false);
      results.classList.remove('visible');

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/transcribe', { method: 'POST', body: formData });
        if (!res.ok) {
          const detail = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(detail.detail || res.statusText);
        }
        const data = await res.json();
        lastResult = data;
        showResults(data);
        hideStatus();
      } catch (err) {
        showStatus('Error: ' + err.message, true);
      } finally {
        transcribeBtn.disabled = false;
        transcribeBtn.textContent = 'transcribe';
      }
    });

    function showStatus(msg, isError) {
      statusText.textContent = msg;
      spinner.style.display = isError ? 'none' : 'block';
      status.className = 'status visible' + (isError ? ' error' : '');
    }

    function hideStatus() {
      status.className = 'status';
    }

    function speakerColor(label) {
      const m = /(\d+)/.exec(label || '');
      const idx = m ? (parseInt(m[1], 10) - 1) : 0;
      return SPEAKER_COLORS[((idx % SPEAKER_COLORS.length) + SPEAKER_COLORS.length) % SPEAKER_COLORS.length];
    }

    function showResults(data) {
      const speakersCell = data.diarized
        ? `<div class="meta-item"><div class="meta-label">speakers</div><div class="meta-value">${data.speaker_count}</div></div>`
        : `<div class="meta-item"><div class="meta-label">speakers</div><div class="meta-value" style="color:var(--steel)">off</div></div>`;

      metaStrip.innerHTML = `
        <div class="meta-item">
          <div class="meta-label">language</div>
          <div class="meta-value">${(data.language || '?').toUpperCase()}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">duration</div>
          <div class="meta-value">${formatDuration(data.duration)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">segments</div>
          <div class="meta-value">${data.segments.length}</div>
        </div>
        ${speakersCell}
      `;

      // Transcript view — merge consecutive segments from the same speaker
      transcript.innerHTML = '';
      let current = null;
      data.segments.forEach(seg => {
        const spk = seg.speaker || (data.diarized ? 'Unknown' : null);
        if (!current || current.speaker !== spk) {
          current = { speaker: spk, start: seg.start, end: seg.end, text: seg.text };
          renderTurn(current, data.diarized);
        } else {
          current.end = seg.end;
          current.text += ' ' + seg.text;
          current.el.querySelector('.turn-text').textContent = current.text;
          current.el.querySelector('.turn-time').textContent = `${formatClock(current.start)}–${formatClock(current.end)}`;
        }
      });

      jsonOutput.textContent = JSON.stringify(data, null, 2);
      results.classList.add('visible');
    }

    function renderTurn(turn, diarized) {
      const el = document.createElement('div');
      el.className = 'turn';
      const color = speakerColor(turn.speaker);
      const speakerHtml = diarized
        ? `<div class="turn-speaker" style="color:${color}">${turn.speaker || 'Unknown'}<div class="turn-time">${formatClock(turn.start)}–${formatClock(turn.end)}</div></div>`
        : `<div class="turn-speaker" style="color:var(--steel)"><div class="turn-time" style="margin-top:0">${formatClock(turn.start)}–${formatClock(turn.end)}</div></div>`;
      el.innerHTML = `${speakerHtml}<div class="turn-text">${turn.text}</div>`;
      transcript.appendChild(el);
      turn.el = el;
    }

    function formatClock(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    // Copy / Download
    copyBtn.addEventListener('click', () => {
      if (!lastResult) return;
      navigator.clipboard.writeText(JSON.stringify(lastResult, null, 2))
        .then(() => { copyBtn.textContent = 'copied!'; setTimeout(() => { copyBtn.textContent = 'copy json'; }, 1500); });
    });

    downloadBtn.addEventListener('click', () => {
      if (!lastResult) return;
      const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (selectedFile ? selectedFile.name.replace(/\.[^.]+$/, '') : 'transcription') + '.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // Utils
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function formatDuration(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      if (h > 0) return `${h}h ${m}m ${sec}s`;
      if (m > 0) return `${m}m ${sec}s`;
      return `${sec}s`;
    }
  </script>
</body>
</html>
